name: performance-review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run performance reviewer action
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          impact-level: all
          skip: dist
