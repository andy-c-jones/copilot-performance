name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without leading v (for example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match x.y.z (for example: 1.2.3)"
            exit 1
          fi

      - name: Create release with autogenerated notes
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = "${{ inputs.version }}";
            const tagName = `v${version}`;

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: "main",
              name: tagName,
              generate_release_notes: true
            });

            core.notice(`Created release: ${release.data.html_url}`);
